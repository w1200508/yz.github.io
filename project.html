<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project — Yechen Zhu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{--bg:#EDEAE2;--bg-2:#E4E0D6;--ink:#16140F;--ink-soft:#4A463C;--muted:#908A7B;--line:#C9C3B5;--accent:#B6452B;--ease:cubic-bezier(.22,1,.36,1)}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
.lenis.lenis-smooth{scroll-behavior:auto!important}
body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk","Noto Sans SC",system-ui,sans-serif;font-size:17px;line-height:1.5;overflow-x:hidden}
html[lang="zh"] body{font-family:"Noto Sans SC","Space Grotesk",system-ui,sans-serif}
::selection{background:var(--accent);color:#F7F4EC}
a{color:inherit;text-decoration:none}
img{display:block;width:100%;height:auto}
.serif{font-family:"Instrument Serif",Georgia,serif;font-weight:400}.italic{font-style:italic}
.wrap{width:100%;max-width:1500px;margin:0 auto;padding:0 40px}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}
.cursor{position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9000;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease),background .3s}
.cursor.big{width:80px;height:80px;background:rgba(182,69,43,.18)}
.cursor.big::after{content:attr(data-label);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
@media (hover:none){.cursor{display:none}}
nav{position:fixed;top:0;left:0;width:100%;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:22px 40px;mix-blend-mode:difference;color:#EDEAE2}
nav .logo{font-weight:600;font-size:18px}nav .logo span{color:var(--accent)}
nav .right{display:flex;align-items:center;gap:26px}
nav .back{font-size:14px}
.lang{display:flex;gap:6px;font-size:13px;border:1px solid currentColor;border-radius:30px;padding:5px 4px}
.lang button{background:none;border:none;color:inherit;cursor:pointer;font:inherit;padding:2px 9px;border-radius:30px;opacity:.5;transition:.3s}
.lang button.on{background:var(--accent);color:#F7F4EC;opacity:1}
.p-hero{padding:150px 0 50px}
.p-hero .eyebrow{margin-bottom:24px}
.p-hero h1{font-size:clamp(44px,8.5vw,140px);line-height:.9;font-weight:500;letter-spacing:-.03em}
.p-hero .sub{font-size:clamp(20px,2.4vw,34px);color:var(--ink-soft);max-width:26ch;margin-top:26px;line-height:1.25}
.meta-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:26px 0;margin-top:46px}
.meta-bar .m .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.meta-bar .m .v{font-size:16px}
@media(max-width:760px){.meta-bar{grid-template-columns:1fr 1fr;gap:24px}}
.lead-img{margin:50px 0;border-radius:4px;overflow:hidden;background:var(--bg-2)}
.p-body{display:grid;grid-template-columns:1fr 1.3fr;gap:60px;padding:40px 0 20px}
.p-body .label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.p-body .text p{font-size:clamp(20px,2.1vw,30px);line-height:1.4;letter-spacing:-.01em;margin-bottom:26px}
@media(max-width:820px){.p-body{grid-template-columns:1fr;gap:18px}}
.gallery{display:flex;flex-direction:column;gap:18px;padding:40px 0 80px}
.gallery .g{border-radius:4px;overflow:hidden;background:var(--bg-2)}
.next{border-top:1px solid var(--line);padding:60px 0 120px}
.next a{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.next .lbl{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.next h2{font-size:clamp(40px,8vw,110px);font-weight:500;letter-spacing:-.03em;line-height:.95;transition:color .4s}
.next a:hover h2{color:var(--accent)}
.next .arrow{font-size:clamp(40px,8vw,90px);color:var(--accent)}
.reveal{opacity:0;transform:translateY(36px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal.in{opacity:1;transform:none}
@media(max-width:720px){.wrap{padding:0 22px}nav{padding:18px 22px}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<nav>
  <a href="index.html" class="logo">YECHEN<span>.</span>ZHU</a>
  <div class="right">
    <a href="index.html" class="back" data-cursor="Back" id="back">← All Work</a>
    <div class="lang">
      <button data-lang="en" id="btn-en">EN</button>
      <button data-lang="zh" id="btn-zh">中</button>
    </div>
  </div>
</nav>
<main class="wrap" id="main"></main>

<script src="content.js?v=5"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script>
let lang=localStorage.getItem('lang')||'en';
const L=o=>o==null?'':(typeof o==='string'?o:(o[lang]??o.en??''));
const params=new URLSearchParams(location.search);
const id=params.get('id');
const idx=Math.max(0,PROJECTS.findIndex(p=>p.id===id));
const p=PROJECTS[idx];const next=PROJECTS[(idx+1)%PROJECTS.length];

function render(){
  document.documentElement.lang=lang;
  document.title=L(p.title)+" — Yechen Zhu";
  document.getElementById('back').textContent=L(UI.allWork);
  document.getElementById('btn-en').classList.toggle('on',lang==='en');
  document.getElementById('btn-zh').classList.toggle('on',lang==='zh');
  document.getElementById('main').innerHTML=`
    <section class="p-hero">
      <div class="eyebrow reveal in">${L(p.tags)} — ${p.year}</div>
      <h1 class="reveal in">${L(p.title)}</h1>
      <div class="sub reveal in">${L(p.subtitle)}</div>
      <div class="meta-bar reveal in">
        <div class="m"><div class="k">${lang==='zh'?'角色':'Role'}</div><div class="v">${L(p.role)}</div></div>
        <div class="m"><div class="k">${lang==='zh'?'类型':'Type'}</div><div class="v">${L(p.type)}</div></div>
        <div class="m"><div class="k">${lang==='zh'?'年份':'Year'}</div><div class="v">${p.year}</div></div>
        <div class="m"><div class="k">${lang==='zh'?'工具':'Tools'}</div><div class="v">${p.tools||'—'}</div></div>
      </div>
    </section>
    <div class="lead-img reveal in"><img src="${(p.gallery&&p.gallery[0])||p.cover}" alt="${L(p.title)}"></div>
    <section class="p-body">
      <div class="label reveal">${L(UI.overview)}</div>
      <div class="text reveal">${(p.body||[]).map(t=>`<p>${L(t)}</p>`).join('')}</div>
    </section>
    <section class="gallery">
      ${(p.gallery||[]).slice(1).map(src=>`<div class="g reveal"><img src="${src}" alt="${L(p.title)}" loading="lazy"></div>`).join('')}
    </section>
    <section class="next">
      <div class="lbl reveal in">${L(UI.nextProject)}</div>
      <a href="project.html?id=${next.id}" data-cursor="View"><h2 class="reveal in">${L(next.title)}</h2><span class="arrow reveal in">↗</span></a>
    </section>`;
  bindCursor();
  observeReveals();
}
function setLang(l){if(l===lang)return;lang=l;localStorage.setItem('lang',l);render();document.querySelectorAll('.reveal').forEach(e=>e.classList.add('in'));}
document.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

let io;
function observeReveals(){io&&io.disconnect();io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12,rootMargin:'0px 0px -8% 0px'});document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));}

let lenis;
if(window.Lenis){lenis=new Lenis({duration:1.15,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t))});(function raf(t){lenis.raf(t);requestAnimationFrame(raf);})();}

const cur=document.getElementById('cursor');let cx=0,cy=0,tx=0,ty=0;
window.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
(function loop(){cx+=(tx-cx)*.18;cy+=(ty-cy)*.18;cur.style.transform=`translate(${cx}px,${cy}px) translate(-50%,-50%)`;requestAnimationFrame(loop);})();
function bindCursor(){document.querySelectorAll('a,button,[data-cursor]').forEach(el=>{el.onmouseenter=()=>{cur.classList.add('big');cur.setAttribute('data-label',el.getAttribute('data-cursor')||'');};el.onmouseleave=()=>{cur.classList.remove('big');cur.removeAttribute('data-label');};});}

render();
window.scrollTo(0,0);
</script>
</body>
</html>
