<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Project — Yechen Zhu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#EDEAE2;--bg-2:#E4E0D6;--ink:#16140F;--ink-soft:#4A463C;
  --muted:#908A7B;--line:#C9C3B5;--accent:#B6452B;--ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
.lenis.lenis-smooth{scroll-behavior:auto!important}
body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;font-size:17px;line-height:1.5;overflow-x:hidden}
::selection{background:var(--accent);color:#F7F4EC}
a{color:inherit;text-decoration:none}
img{display:block;width:100%;height:auto}
.serif{font-family:"Instrument Serif",Georgia,serif;font-weight:400}
.italic{font-style:italic}
.wrap{width:100%;max-width:1500px;margin:0 auto;padding:0 40px}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent)}

.cursor{position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9000;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease),background .3s}
.cursor.big{width:80px;height:80px;background:rgba(182,69,43,.18)}
.cursor.big::after{content:attr(data-label);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
@media (hover:none){.cursor{display:none}}

nav{position:fixed;top:0;left:0;width:100%;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:22px 40px;mix-blend-mode:difference;color:#EDEAE2}
nav .logo{font-weight:600;font-size:18px}
nav .logo span{color:var(--accent)}
nav .back{font-size:14px;display:flex;align-items:center;gap:8px}

/* hero */
.p-hero{padding:150px 0 50px}
.p-hero .eyebrow{margin-bottom:24px}
.p-hero h1{font-size:clamp(48px,9vw,150px);line-height:.9;font-weight:500;letter-spacing:-.03em}
.p-hero .sub{font-size:clamp(20px,2.4vw,34px);color:var(--ink-soft);max-width:24ch;margin-top:26px;line-height:1.25}
.p-hero .sub .serif{color:var(--accent)}

/* meta bar */
.meta-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:30px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:26px 0;margin-top:46px}
.meta-bar .m .k{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.meta-bar .m .v{font-size:16px;color:var(--ink)}
@media(max-width:760px){.meta-bar{grid-template-columns:1fr 1fr;gap:24px}}

/* lead image */
.lead-img{margin:50px 0;border-radius:4px;overflow:hidden;background:var(--bg-2)}

/* body text */
.p-body{display:grid;grid-template-columns:1fr 1.3fr;gap:60px;padding:40px 0 20px}
.p-body .label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.p-body .text p{font-size:clamp(20px,2.1vw,30px);line-height:1.4;letter-spacing:-.01em;margin-bottom:26px;color:var(--ink)}
@media(max-width:820px){.p-body{grid-template-columns:1fr;gap:18px}}

/* gallery */
.gallery{display:flex;flex-direction:column;gap:18px;padding:40px 0 80px}
.gallery .g{border-radius:4px;overflow:hidden;background:var(--bg-2)}

/* next */
.next{border-top:1px solid var(--line);padding:60px 0 120px}
.next a{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:20px}
.next .lbl{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.next h2{font-size:clamp(40px,8vw,110px);font-weight:500;letter-spacing:-.03em;line-height:.95;transition:color .4s}
.next a:hover h2{color:var(--accent)}
.next .arrow{font-size:clamp(40px,8vw,90px);color:var(--accent)}

.reveal{opacity:0;transform:translateY(36px);transition:opacity .9s var(--ease),transform .9s var(--ease)}
.reveal.in{opacity:1;transform:none}
@media(max-width:720px){.wrap{padding:0 22px}nav{padding:18px 22px}}
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>

<nav>
  <a href="index.html" class="logo">YECHEN<span>.</span>ZHU</a>
  <a href="index.html" class="back" data-cursor="Back">← All Work</a>
</nav>

<main class="wrap" id="main"><!-- content injected by JS --></main>

<script src="content.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script>
/* 读取网址里的 ?id=xxx,找到对应项目 */
const params=new URLSearchParams(location.search);
const id=params.get('id');
const idx=PROJECTS.findIndex(p=>p.id===id);
const p=PROJECTS[idx]||PROJECTS[0];
const next=PROJECTS[(idx+1)%PROJECTS.length];
document.title=p.title+" — Yechen Zhu";

const main=document.getElementById('main');
main.innerHTML=`
  <section class="p-hero">
    <div class="eyebrow reveal in">${p.tags} — ${p.year}</div>
    <h1 class="reveal in">${p.title}</h1>
    <div class="sub reveal in">${p.subtitle||''}</div>
    <div class="meta-bar reveal in">
      <div class="m"><div class="k">Role</div><div class="v">${p.role||'—'}</div></div>
      <div class="m"><div class="k">Type</div><div class="v">${p.type||'—'}</div></div>
      <div class="m"><div class="k">Year</div><div class="v">${p.year||'—'}</div></div>
      <div class="m"><div class="k">Tools</div><div class="v">${p.tools||'—'}</div></div>
    </div>
  </section>

  <div class="lead-img reveal"><img src="${(p.gallery&&p.gallery[0])||p.cover}" alt="${p.title}"></div>

  <section class="p-body">
    <div class="label reveal">Overview</div>
    <div class="text reveal">${(p.body||[]).map(t=>`<p>${t}</p>`).join('')}</div>
  </section>

  <section class="gallery">
    ${(p.gallery||[]).slice(1).map(src=>`<div class="g reveal"><img src="${src}" alt="${p.title}" loading="lazy"></div>`).join('')}
  </section>

  <section class="next">
    <div class="lbl reveal in">Next Project</div>
    <a href="project.html?id=${next.id}" data-cursor="View">
      <h2 class="reveal in">${next.title}</h2>
      <span class="arrow reveal in">↗</span>
    </a>
  </section>
`;

/* lenis 平滑滚动 */
let lenis;
if(window.Lenis){lenis=new Lenis({duration:1.15,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t))});
  function raf(t){lenis.raf(t);requestAnimationFrame(raf);}requestAnimationFrame(raf);}

/* 滚动渐入 */
const io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.12,rootMargin:'0px 0px -8% 0px'});
document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));

/* 自定义光标 */
const cur=document.getElementById('cursor');let cx=0,cy=0,tx=0,ty=0;
window.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
function loop(){cx+=(tx-cx)*.18;cy+=(ty-cy)*.18;cur.style.transform=`translate(${cx}px,${cy}px) translate(-50%,-50%)`;requestAnimationFrame(loop);}loop();
document.querySelectorAll('a,[data-cursor]').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.classList.add('big');cur.setAttribute('data-label',el.getAttribute('data-cursor')||'');});
  el.addEventListener('mouseleave',()=>{cur.classList.remove('big');cur.removeAttribute('data-label');});
});
window.scrollTo(0,0);
</script>
</body>
</html>
