<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yechen Zhu — Industrial &amp; Interaction Designer</title>
<meta name="description" content="Yechen Zhu — industrial and interaction designer working across products, interfaces and material research." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#EDEAE2;--bg-2:#E4E0D6;--ink:#16140F;--ink-soft:#4A463C;
  --muted:#908A7B;--line:#C9C3B5;--accent:#B6452B;--ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
.lenis.lenis-smooth{scroll-behavior:auto!important}
.lenis.lenis-smooth [data-lenis-prevent]{overscroll-behavior:contain}
body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk","Noto Sans SC",system-ui,sans-serif;font-size:17px;line-height:1.5;overflow-x:hidden}
html[lang="zh"] body{font-family:"Noto Sans SC","Space Grotesk",system-ui,sans-serif}
::selection{background:var(--accent);color:#F7F4EC}
a{color:inherit;text-decoration:none}
img{display:block;width:100%;height:100%;object-fit:cover}
.serif{font-family:"Instrument Serif",Georgia,serif;font-weight:400}
.italic{font-style:italic}
.wrap{width:100%;max-width:1500px;margin:0 auto;padding:0 40px}
section{position:relative}
.eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);flex:none}

/* preloader */
#loader{position:fixed;inset:0;z-index:9999;background:var(--ink);display:flex;align-items:flex-end;justify-content:space-between;padding:40px;color:#EDEAE2}
#loader .l-name{font-size:clamp(40px,9vw,130px);line-height:.92;font-weight:500;letter-spacing:-.03em}
#loader .l-count{font-family:"Instrument Serif",serif;font-size:clamp(40px,9vw,120px);line-height:.9}
#loader.done{transform:translateY(-100%);transition:transform 1s var(--ease)}

/* cursor */
.cursor{position:fixed;top:0;left:0;width:9px;height:9px;border-radius:50%;background:var(--accent);pointer-events:none;z-index:9000;transform:translate(-50%,-50%);transition:width .3s var(--ease),height .3s var(--ease),background .3s}
.cursor.big{width:80px;height:80px;background:rgba(182,69,43,.18)}
.cursor.big::after{content:attr(data-label);position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}
@media (hover:none){.cursor{display:none}}

/* nav */
nav{position:fixed;top:0;left:0;width:100%;z-index:800;display:flex;align-items:center;justify-content:space-between;padding:22px 40px;mix-blend-mode:difference;color:#EDEAE2;transition:transform .5s var(--ease)}
nav.hide{transform:translateY(-120%)}
nav .logo{font-weight:600;letter-spacing:-.01em;font-size:18px}
nav .logo span{color:var(--accent)}
nav .right{display:flex;align-items:center;gap:34px}
nav .links{display:flex;gap:34px;font-size:14px;letter-spacing:.02em}
nav .links a{position:relative;padding:4px 0}
nav .links a::after{content:"";position:absolute;left:0;bottom:0;width:100%;height:1px;background:currentColor;transform:scaleX(0);transform-origin:right;transition:transform .4s var(--ease)}
nav .links a:hover::after{transform:scaleX(1);transform-origin:left}
.lang{display:flex;gap:6px;font-size:13px;border:1px solid currentColor;border-radius:30px;padding:5px 4px}
.lang button{background:none;border:none;color:inherit;cursor:pointer;font:inherit;padding:2px 9px;border-radius:30px;opacity:.5;transition:.3s}
.lang button.on{background:var(--accent);color:#F7F4EC;opacity:1}
@media(max-width:720px){nav .links{display:none}}

/* hero */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:48px;padding-top:140px}
.hero-top{flex:1;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:30px}
.hero-tag{max-width:380px;color:var(--ink-soft);font-size:16px}
.hero h1{font-size:clamp(54px,14.5vw,250px);line-height:.86;font-weight:500;letter-spacing:-.04em;margin-top:.2em}
.hero h1 .serif{display:block;font-weight:400;letter-spacing:-.01em}
.hero-foot{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px;margin-top:34px;border-top:1px solid var(--line);padding-top:20px}
.hero-foot .role{font-size:15px;color:var(--ink-soft);max-width:440px}
.scroll-cue{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.scroll-cue .dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:bob 1.6s infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* marquee */
.marquee{border-top:1px solid var(--line);border-bottom:1px solid var(--line);overflow:hidden;padding:26px 0;margin-top:10px;white-space:nowrap}
.marquee .track{display:inline-flex;gap:50px;animation:scroll 28s linear infinite;will-change:transform}
.marquee span{font-family:"Instrument Serif",serif;font-size:clamp(34px,5vw,72px);color:var(--ink)}
.marquee span.o{color:transparent;-webkit-text-stroke:1px var(--ink-soft)}
.marquee .star{color:var(--accent);font-family:"Space Grotesk"}
@keyframes scroll{to{transform:translateX(-50%)}}

/* about */
.about{padding:140px 0 40px}
.about-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:80px;align-items:start;margin-bottom:90px}
.about-grid p.lead{font-size:clamp(24px,2.7vw,42px);line-height:1.24;letter-spacing:-.015em;font-weight:400}
.about-side{font-size:15px;color:var(--ink-soft);line-height:1.6}
.res{display:grid;grid-template-columns:1fr 1.4fr;gap:30px 80px;padding:46px 0;border-top:1px solid var(--line)}
.res .res-h{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding-top:4px}
.res .res-body{display:flex;flex-direction:column;gap:30px}
.res-item .top{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:baseline}
.res-item .ti{font-size:clamp(19px,2vw,26px);font-weight:500;letter-spacing:-.01em}
.res-item .dt{font-family:"Instrument Serif",serif;color:var(--muted);font-size:17px;white-space:nowrap}
.res-item .sub{color:var(--ink-soft);font-size:15px;margin-top:4px}
.res-item ul{list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:8px}
.res-item ul li{position:relative;padding-left:18px;font-size:15px;color:var(--ink-soft);line-height:1.5}
.res-item ul li::before{content:"";position:absolute;left:0;top:9px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.pub-list,.skill-list{display:flex;flex-direction:column;gap:14px}
.pub-list .p{font-size:16px;color:var(--ink);padding-bottom:14px;border-bottom:1px solid var(--line)}
.skill-row{display:grid;grid-template-columns:120px 1fr;gap:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.skill-row .sk{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding-top:3px}
.skill-row .sv{font-size:15px;color:var(--ink)}
@media(max-width:900px){.about-grid{grid-template-columns:1fr;gap:40px;margin-bottom:60px}.res{grid-template-columns:1fr;gap:18px}}

/* work */
.work{padding:90px 0 120px}
.work-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:54px;flex-wrap:wrap;gap:20px}
.work-head h2{font-size:clamp(34px,5vw,80px);font-weight:500;letter-spacing:-.03em;line-height:.95}
.work-count{font-family:"Instrument Serif",serif;font-size:22px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px 24px}
.card{position:relative;cursor:pointer}
.card .frame{position:relative;overflow:hidden;border-radius:3px;background:var(--bg-2);aspect-ratio:4/3}
.card .frame img{transform:scale(1.02);transition:transform 1.1s var(--ease);filter:saturate(.96)}
.card:hover .frame img{transform:scale(1.07)}
.card .meta{display:flex;justify-content:space-between;align-items:baseline;padding:16px 4px 28px;border-bottom:1px solid var(--line)}
.card .meta .t{font-size:clamp(20px,2.2vw,30px);font-weight:500;letter-spacing:-.02em;display:flex;align-items:center;gap:12px;transition:transform .5s var(--ease)}
.card:hover .meta .t{transform:translateX(10px)}
.card .meta .t .num{font-family:"Instrument Serif",serif;color:var(--muted);font-size:.6em}
.card .meta .tags{font-size:13px;color:var(--muted);text-align:right}
.card .arrow{position:absolute;top:16px;right:16px;width:42px;height:42px;border-radius:50%;background:var(--accent);color:#F7F4EC;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(.6) rotate(-30deg);transition:.5s var(--ease);font-size:18px}
.card:hover .arrow{opacity:1;transform:scale(1) rotate(0)}
.card.wide{grid-column:span 2}
.card.wide .frame{aspect-ratio:16/7}
@media(max-width:760px){.grid{grid-template-columns:1fr}.card.wide{grid-column:span 1}.card.wide .frame{aspect-ratio:4/3}}

/* approach */
.approach{padding:120px 0;background:var(--ink);color:#E8E4DA;border-radius:30px;margin:0 0 120px}
.approach .wrap{padding:0 56px}
.approach .eyebrow{color:#9b9788}
.approach h2{font-size:clamp(34px,5.5vw,86px);font-weight:500;letter-spacing:-.03em;line-height:.96;margin:22px 0 70px;max-width:15ch}
.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.step{padding:34px 30px 34px 0;border-top:1px solid #38342a}
.step .no{font-family:"Instrument Serif",serif;font-size:40px;color:var(--accent);margin-bottom:18px}
.step h3{font-size:26px;font-weight:500;letter-spacing:-.01em;margin-bottom:14px}
.step p{color:#a8a496;font-size:15px;line-height:1.55}
@media(max-width:820px){.steps{grid-template-columns:1fr}.approach .wrap{padding:0 30px}}

/* recognition */
.recog{padding:0 0 130px}
.recog-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:40px;flex-wrap:wrap;gap:16px}
.recog-head h2{font-size:clamp(30px,4vw,60px);font-weight:500;letter-spacing:-.03em}
.recog-list{border-top:1px solid var(--line)}
.recog-row{display:grid;grid-template-columns:auto 1fr auto;gap:30px;align-items:center;padding:26px 6px;border-bottom:1px solid var(--line);transition:padding-left .4s var(--ease),background .4s}
.recog-row:hover{padding-left:24px;background:var(--bg-2)}
.recog-row .yr{font-family:"Instrument Serif",serif;font-size:22px;color:var(--muted)}
.recog-row .name{font-size:clamp(17px,1.9vw,26px);font-weight:500;letter-spacing:-.01em}
.recog-row .org{font-size:14px;color:var(--muted);text-align:right}

/* contact */
.contact{padding:120px 0 60px;border-top:1px solid var(--line)}
.contact h2{font-size:clamp(46px,10vw,190px);font-weight:500;letter-spacing:-.04em;line-height:.9}
.contact h2 a{transition:color .4s}
.contact h2 a:hover{color:var(--accent)}
.contact .serif{display:block}
.contact-foot{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:30px;margin-top:60px;padding-top:24px;border-top:1px solid var(--line)}
.contact-foot .socials{display:flex;gap:26px;font-size:15px;flex-wrap:wrap}
.contact-foot .socials a{position:relative}
.contact-foot .socials a::after{content:"↗";font-size:.8em;margin-left:4px;color:var(--accent)}
.contact-foot .copy{font-size:13px;color:var(--muted)}

.reveal{opacity:0;transform:translateY(40px);transition:opacity 1s var(--ease),transform 1s var(--ease)}
.reveal.in{opacity:1;transform:none}
.reveal.d1{transition-delay:.08s}.reveal.d2{transition-delay:.16s}.reveal.d3{transition-delay:.24s}

@media(max-width:720px){.wrap{padding:0 22px}nav{padding:18px 22px}#loader{padding:22px}nav .right{gap:16px}}
</style>
</head>
<body>

<div id="loader">
  <div class="l-name serif">Yechen<br>Zhu</div>
  <div class="l-count" id="lcount">0</div>
</div>

<div class="cursor" id="cursor"></div>

<nav id="nav">
  <a href="#top" class="logo">YECHEN<span>.</span>ZHU</a>
  <div class="right">
    <div class="links">
      <a href="#work" data-scroll id="lnk-work">Work</a>
      <a href="#about" data-scroll id="lnk-about">About</a>
      <a href="#approach" data-scroll id="lnk-approach">Approach</a>
      <a href="#contact" data-scroll id="lnk-contact">Contact</a>
    </div>
    <div class="lang">
      <button data-lang="en" id="btn-en">EN</button>
      <button data-lang="zh" id="btn-zh">中</button>
    </div>
  </div>
</nav>

<!-- hero -->
<header class="hero wrap" id="top">
  <div class="hero-top">
    <div class="hero-tag reveal">
      <div class="eyebrow" style="margin-bottom:14px" id="hero-available">Available 2026</div>
      <span id="hero-tag"></span>
    </div>
    <div class="scroll-cue reveal"><span id="hero-scroll">Scroll</span> <span class="dot"></span></div>
  </div>
  <h1 class="reveal d1"><span id="hero-title"></span><span class="serif italic" id="hero-accent"></span></h1>
  <div class="hero-foot">
    <div class="role reveal d2" id="hero-role"></div>
    <div class="eyebrow reveal d2" id="hero-tagline"></div>
  </div>
</header>

<!-- marquee -->
<div class="marquee">
  <div class="track" id="marquee"></div>
</div>

<!-- about -->
<section class="about wrap" id="about">
  <div class="eyebrow reveal" style="margin-bottom:50px" id="about-label">About</div>
  <div class="about-grid">
    <p class="lead reveal" id="about-lead"></p>
    <div class="about-side reveal d1" id="about-summary"></div>
  </div>

  <div class="res">
    <div class="res-h reveal" id="exp-label">Experience</div>
    <div class="res-body reveal d1" id="exp-list"></div>
  </div>
  <div class="res">
    <div class="res-h reveal" id="edu-label">Education</div>
    <div class="res-body reveal d1" id="edu-list"></div>
  </div>
  <div class="res">
    <div class="res-h reveal" id="pub-label">Publications</div>
    <div class="res-body pub-list reveal d1" id="pub-list"></div>
  </div>
  <div class="res">
    <div class="res-h reveal" id="skill-label">Skills</div>
    <div class="res-body skill-list reveal d1" id="skill-list"></div>
  </div>
</section>

<!-- work -->
<section class="work wrap" id="work">
  <div class="work-head">
    <h2 class="reveal" id="work-title">Selected Work</h2>
    <div class="work-count reveal d1" id="work-count"></div>
  </div>
  <div class="grid" id="grid"></div>
</section>

<!-- approach -->
<section class="approach" id="approach">
  <div class="wrap">
    <div class="eyebrow reveal" id="appr-label">Approach</div>
    <h2 class="reveal d1" id="appr-title"></h2>
    <div class="steps" id="appr-steps"></div>
  </div>
</section>

<!-- recognition -->
<section class="recog wrap">
  <div class="recog-head">
    <h2 class="reveal" id="recog-title">Recognition</h2>
    <div class="eyebrow reveal d1" id="recog-label">Awards &amp; Recognition</div>
  </div>
  <div class="recog-list" id="recog-list"></div>
</section>

<!-- contact -->
<section class="contact wrap" id="contact">
  <div class="eyebrow reveal" style="margin-bottom:34px" id="contact-eyebrow">Let's work together</div>
  <h2 class="reveal d1"><span id="contact-title"></span><span class="serif italic"><a href="#" data-email data-cursor="Email" id="contact-hello"></a></span></h2>
  <div class="contact-foot">
    <div class="socials reveal">
      <a href="#" data-email>Email</a>
      <a href="https://www.linkedin.com/" target="_blank" rel="noopener">LinkedIn</a>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener">Instagram</a>
    </div>
    <div class="copy reveal d1" id="contact-copy"></div>
  </div>
</section>

<script src="content.js?v=7"></script>
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script>
/* ---------- 语言 ---------- */
let lang = localStorage.getItem('lang') || 'en';
const L = o => o==null ? '' : (typeof o==='string' ? o : (o[lang] ?? o.en ?? ''));
const $ = id => document.getElementById(id);

/* ---------- 渲染整页(切换语言时重新调用) ---------- */
function render(){
  document.documentElement.lang = lang;
  // nav
  $('lnk-work').textContent=L(UI.navWork);
  $('lnk-about').textContent=L(UI.navAbout);
  $('lnk-approach').textContent=L(UI.navApproach);
  $('lnk-contact').textContent=L(UI.navContact);
  $('btn-en').classList.toggle('on',lang==='en');
  $('btn-zh').classList.toggle('on',lang==='zh');
  // hero
  $('hero-available').textContent=L(UI.available);
  $('hero-tag').textContent=L(UI.heroTag);
  $('hero-scroll').textContent=L(UI.scroll);
  $('hero-title').textContent=L(SITE.heroLine)+' ';
  $('hero-accent').textContent=L(SITE.heroAccent);
  $('hero-role').textContent=L(UI.heroRole);
  $('hero-tagline').textContent=L(UI.tagline);
  // about
  $('about-label').textContent=L(UI.aboutLabel);
  $('about-lead').textContent=L(UI.aboutLead);
  $('about-summary').textContent=L(RESUME.summary);
  $('exp-label').textContent=L(UI.expLabel);
  $('edu-label').textContent=L(UI.eduLabel);
  $('pub-label').textContent=L(UI.pubLabel);
  $('skill-label').textContent=L(UI.skillLabel);
  // experience
  $('exp-list').innerHTML=RESUME.experience.map(e=>`
    <div class="res-item"><div class="top"><div class="ti">${L(e.org)}</div><div class="dt">${e.date}</div></div>
    <div class="sub">${L(e.role)} · ${L(e.place)}</div>
    <ul>${e.points.map(p=>`<li>${L(p)}</li>`).join('')}</ul></div>`).join('');
  // education
  $('edu-list').innerHTML=RESUME.education.map(e=>`
    <div class="res-item"><div class="top"><div class="ti">${L(e.school)}</div><div class="dt">${e.date}</div></div>
    <div class="sub">${L(e.degree)} — ${L(e.note)}</div></div>`).join('');
  // publications
  $('pub-list').innerHTML=RESUME.publications.map(p=>`<div class="p">${L(p)}</div>`).join('');
  // skills
  $('skill-list').innerHTML=RESUME.skills.map(s=>`<div class="skill-row"><div class="sk">${L(s.k)}</div><div class="sv">${s.v}</div></div>`).join('');
  // work
  $('work-title').textContent=L(UI.workTitle);
  $('work-count').textContent='('+PROJECTS.length+' '+(lang==='zh'?'个项目':'Projects')+')';
  $('grid').innerHTML=PROJECTS.map((p,i)=>{
    const num=String(i+1).padStart(2,'0');
    return `<a class="card${p.wide?' wide':''}" href="project.html?id=${p.id}" data-cursor="View">
      <div class="frame"><img src="${p.cover}" alt="${L(p.title)}" loading="lazy"><div class="arrow">↗</div></div>
      <div class="meta"><div class="t"><span class="num">(${num})</span> ${L(p.title)}</div><div class="tags">${L(p.tags)}</div></div>
    </a>`;}).join('');
  // approach
  $('appr-label').textContent=L(UI.approachLabel);
  $('appr-title').innerHTML=L(UI.approachTitle).replace(L(UI.approachAccent),`<span class="serif italic" style="color:var(--accent)">${L(UI.approachAccent)}</span>`);
  $('appr-steps').innerHTML=APPROACH.map(s=>`<div class="step"><div class="no">${s.no}</div><h3>${L(s.h)}</h3><p>${L(s.p)}</p></div>`).join('');
  // recognition
  $('recog-title').textContent=L(UI.recogTitle);
  $('recog-label').textContent=L(UI.recogLabel);
  $('recog-list').innerHTML=RESUME.awards.map(a=>`<div class="recog-row"><span class="yr">${a.yr}</span><span class="name">${L(a.name)}</span><span class="org">${L(a.org)}</span></div>`).join('');
  // contact
  $('contact-eyebrow').textContent=L(UI.contactEyebrow);
  $('contact-title').textContent=L(UI.contactTitle)+' ';
  $('contact-hello').textContent=L(UI.sayHello);
  $('contact-copy').textContent='© '+new Date().getFullYear()+' '+SITE.name+' — '+L(UI.copyright);
  // marquee
  const m=[L(UI.workTitle)]; // not used; build discipline marquee
  const words=lang==='zh'?['产品设计','交互','材料研究','UX / UI']:['Product Design','Interaction','Material Research','UX / UI'];
  let mh='';for(let r=0;r<2;r++){words.forEach((w,i)=>{mh+=`<span class="${i%2?'o':''}">${w}</span><span class="star">✦</span>`;});}
  $('marquee').innerHTML=mh;
  // email links
  document.querySelectorAll('[data-email]').forEach(a=>a.href='mailto:'+SITE.email);
  // cursor + reveal rebind (dynamic nodes)
  bindCursor();
}

/* ---------- language toggle ---------- */
function setLang(l){ if(l===lang) return; lang=l; localStorage.setItem('lang',l); render(); showAllReveals(); }
document.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>setLang(b.dataset.lang)));

/* ---------- reveals ---------- */
let io;
function observeReveals(){
  io=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1,rootMargin:'0px 0px -7% 0px'});
  document.querySelectorAll('.reveal:not(.in)').forEach(el=>io.observe(el));
}
function showAllReveals(){document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in'));}

/* ---------- preloader ---------- */
const lc=$('lcount');let n=0;
const iv=setInterval(()=>{n+=Math.floor(Math.random()*8)+3;if(n>=100){n=100;clearInterval(iv);
  setTimeout(()=>{$('loader').classList.add('done');observeReveals();},420);}lc.textContent=n;},90);

/* ---------- lenis ---------- */
let lenis;
if(window.Lenis){lenis=new Lenis({duration:1.15,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t))});
  (function raf(t){lenis.raf(t);requestAnimationFrame(raf);})();}
function bindScroll(){document.querySelectorAll('[data-scroll]').forEach(a=>{a.onclick=e=>{e.preventDefault();const el=document.querySelector(a.getAttribute('href'));if(el){lenis?lenis.scrollTo(el,{offset:-10}):el.scrollIntoView({behavior:'smooth'});}};});}

/* ---------- nav hide ---------- */
const nav=$('nav');let lastY=0;
window.addEventListener('scroll',()=>{const y=window.scrollY;if(y>lastY&&y>200)nav.classList.add('hide');else nav.classList.remove('hide');lastY=y;},{passive:true});

/* ---------- cursor ---------- */
const cur=$('cursor');let cx=0,cy=0,tx=0,ty=0;
window.addEventListener('mousemove',e=>{tx=e.clientX;ty=e.clientY;});
(function loop(){cx+=(tx-cx)*.18;cy+=(ty-cy)*.18;cur.style.transform=`translate(${cx}px,${cy}px) translate(-50%,-50%)`;requestAnimationFrame(loop);})();
function bindCursor(){document.querySelectorAll('a,button,.card,[data-cursor]').forEach(el=>{
  el.onmouseenter=()=>{cur.classList.add('big');cur.setAttribute('data-label',el.getAttribute('data-cursor')||'');};
  el.onmouseleave=()=>{cur.classList.remove('big');cur.removeAttribute('data-label');};});}

/* ---------- init ---------- */
render();
bindScroll();
</script>
</body>
</html>
